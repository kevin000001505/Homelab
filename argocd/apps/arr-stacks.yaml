# argocd/apps/arr-stacks.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-stacks
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/kevin000001505/Homelab.git
    targetRevision: HEAD
    path: apps/arr-stacks
    directory:
      recurse: true
  destination:
    server: https://192.168.1.15:6443
    namespace: arr-stacks
  syncPolicy: {}
    # automated:
    #   prune: true
    #   selfHeal: true
