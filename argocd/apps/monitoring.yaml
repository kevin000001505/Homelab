# argocd/apps/monitoring.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kevin000001505/Homelab.git
    targetRevision: HEAD
    path: apps/monitoring
    directory:
      recurse: true
  destination:
    server: https://192.168.1.15:6443
    namespace: monitoring
  syncPolicy: {}
    # automated:
    #   prune: true
    #   selfHeal: true
