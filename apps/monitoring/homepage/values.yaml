enableRbac: true

serviceAccount:
  create: true
  name: homepage

controller:
  strategy: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

config:
  kubernetes:
    mode: cluster
  settings:
    background:
      image: https://raw.githubusercontent.com/kevin000001505/Homelab/main/docs/images/background.jpg
    layout:
      System:
        icon: mdi-desktop-classic-#ffffff
        tab: Services

      Monitoring:
        icon: mdi-home-analytics-#ffffff
        tab: Services
        style: row
        columns: 4

      Networking:
        icon: mdi-home-analytics-#ffffff
        tab: Services

      Media Management:
        icon: si-vlcmediaplayer-#ffffff
        tab: Services

      Storage:
        icon: mdi-harddisk-#ffffff
        tab: Services

      Tools:
        icon: mdi-application-brackets-outline-#ffffff
        tab: Services

      Calendar:
        icon: mdi-calendar-month-outline-#ffffff
        tab: Services

      Developer:
        tab: Bookmarks
        header: false

      Social:
        tab: Bookmarks
        header: false

      Entertainment:
        tab: Bookmarks
        header: false

      Useful Links:
        tab: Bookmarks
        header: false

  bookmarks:
    - Developer:
        - Github:
            - icon: https://cdn.jsdelivr.net/npm/@lobehub/icons-static-svg@latest/icons/github.svg
              href: https://github.com/
              description: ""
        - Cloudflare:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/cloudflare.svg
              href: https://www.cloudflare.com/
              description: ""

    - Social:
        - Reddit:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/reddit.svg
              href: https://www.reddit.com/
              description: ""
        - Facebook:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/facebook.svg
              href: https://www.facebook.com/
              description: ""
        - Instagram:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/instagram.svg
              href: https://www.instagram.com/
              description: ""

    - Entertainment:
        - Youtube:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/youtube.svg
              href: https://www.youtube.com/
              description: ""
        - Amazon:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/amazon.svg
              href: https://www.amazon.com/
              description: ""

    - Useful Links:
        - Proxmox VE Scripts:
            - icon: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/proxmox-helper-scripts.svg
              href: https://community-scripts.org/
              abbr: ""
        - FK Microsoft:
            - icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/microsoft-365-admin-center.svg
              href: https://massgrave.dev/windows_11_links
              description: ""

  widgets:
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "k3s"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: google
        target: _blank
        showSearchSuggestions: true
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hour12: true
    - openmeteo:
        label: Fairfax, VA
        latitude: 38.847118
        longitude: -77.306320
        timezone: America/New_York
        cache: 5
        units: metric

  services:
    - Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://grafana.lan.shiba-toast.com
        - Argo CD:
            icon: argo-cd.png
            href: https://argocd.lan.shiba-toast.com
        - Traefik:
            icon: traefik.png
            href: https://traefik.lan.shiba-toast.com
        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://uptime.lan.shiba-toast.com
            widget:
              type: uptimekuma
              url: http://uptime-kuma.monitoring.svc.cluster.local
              slug: homelab

    - Networking:
        - Adguard Home:
            icon: adguard-home.png
            href: "{{ HOMEPAGE_VAR_ADGUARD_IP }}"
            # widget:
            #   type: adguard
            #   url: "{{ HOMEPAGE_VAR_ADGUARD_IP }}"
            #   username: "{{ HOMEPAGE_VAR_ADGUARD_USERNAME }}"
            #   password: "{{ HOMEPAGE_VAR_ADGUARD_PASSWORD }}"
        - Speedtest Tracker:
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/speedtest-tracker.svg
            href: https://speedtest.lan.shiba-toast.com
            widget:
              type: speedtest
              url: http://speedtest-tracker.monitoring.svc.cluster.local
              version: 1 # optional, default is 1
              key: "{{ HOMEPAGE_VAR_SPEEDTEST_API_KEY }}"
              bitratePrecision: 0 # optional, default is 0

    - Storage:
        - TrueNAS:
            icon: truenas.png
            href: "https://truenas.lan.shiba-toast.com"
            # widget:
            #   type: truenas
            #   url: "{{ HOMEPAGE_VAR_TRUENAS_IP }}"
            #   version: 2 # optional, defaults to 1
            #   username: "{{ HOMEPAGE_VAR_TRUENAS_USERNAME }}" # not required if using api key
            #   password: "{{ HOMEPAGE_VAR_TRUENAS_PASSWORD }}" # not required if using api key
            #   # key: "{{ HOMEPAGE_VAR_TRUENAS_API_KEY }}" # not required if using username / password
            #   enablePools: true # optional, defaults to false
            #   nasType: scale # defaults to scale, must be set to 'core' if using enablePools with TrueNAS Core
        - Proxmox Backup Server:
            icon: proxmox.png
            href: "{{HOMEPAGE_VAR_PBS_IP}}"
            # widget:
            #   type: proxmoxbackupserver
            #   url: "{{HOMEPAGE_VAR_PBS_IP}}"
            #   username: "{{HOMEPAGE_VAR_PBS_USERNAME}}"
            #   password: "{{HOMEPAGE_VAR_PBS_PASSWORD}}"
            #   # datastore: backup
    - Tools:
        - Bentopdf:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/bentopdf.svg
            href: https://bentopdf.lan.shiba-toast.com
        - OpenWebUI:
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/open-webui.svg
            href: https://openwebui.lan.shiba-toast.com
        - Subsyncarr:
            icon: 🧬
            href: https://subsyncarr.lan.shiba-toast.com
    - Calendar:
        widget:
          type: calendar
          firstDayInWeek: monday
          view: monthly
          showTime: true
          timezone: America/New_York
          # integrations: # optional
          #   - type: sonarr # active widget type that is currently enabled on homepage - possible values: radarr, sonarr, lidarr, readarr, ical
          #     service_group: media # group name where widget exists
          #     service_name: sonarr # service name for that widget
          #     color: teal # optional - defaults to pre-defined color for the service (teal for sonarr)
          #     baseUrl: https://sonarr.example.tld # optional - adds links to sonarr/radarr pages
          #     params: # optional - additional params for the service
          #   - type: radarr # active widget type that is currently enabled on homepage - possible values: radarr, sonarr, lidarr, readarr, ical
          #     service_group: media # group name where widget exists
          #     service_name: radarr # service name for that widget
          #     color: orange # optional - defaults to pre-defined color for the service (teal for sonarr)
          #     baseUrl: https://radarr.example.tld # optional - adds links to sonarr/radarr pages
          #     params: # optional - additional params for the service

ingress:
  main:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: homepage.lan.shiba-toast.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: homepage-tls
        hosts:
          - homepage.lan.shiba-toast.com

env:
  - name: HOMEPAGE_ALLOWED_HOSTS
    value: "homepage.lan.shiba-toast.com"
  - name: HOMEPAGE_VAR_SPEEDTEST_API_KEY
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: speed-test-api
  - name: HOMEPAGE_VAR_ADGUARD_IP
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: adguard-ip
  - name: HOMEPAGE_VAR_ADGUARD_USERNAME
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: adguard-username
  - name: HOMEPAGE_VAR_ADGUARD_PASSWORD
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: adguard-password
  - name: HOMEPAGE_VAR_PBS_USERNAME
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: pbs-username
  - name: HOMEPAGE_VAR_PBS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: pbs-password
  - name: HOMEPAGE_VAR_PBS_IP
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: pbs-ip
  - name: HOMEPAGE_VAR_TRUENAS_IP
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: truenas-ip
  - name: HOMEPAGE_VAR_TRUENAS_API_KEY
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: truenas-api-key
  - name: HOMEPAGE_VAR_TRUENAS_USERNAME
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: truenas-username
  - name: HOMEPAGE_VAR_TRUENAS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: homepage-secret
        key: truenas-password
