apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: monitoring
  labels:
    app: uptime-kuma
    tier: monitoring
spec:
  type: ClusterIP # NodePort, LoadBalancer(MetalLB assigns a real IP), ExternalName
  selector: # Key-Value map. ALL keys must match the pod's labels
    app: uptime-kuma
    tier: monitoring
  ports:
    - name: http
      port: 80
      targetPort: 3001
      protocol: TCP
