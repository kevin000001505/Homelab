apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dawarich
  namespace: utilities
  labels:
    app: dawarich
    tier: utilities
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure # web for HTTP, websecure for HTTPS. Can use both by separating with comma: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-geoblock@kubernetescrd, kube-system-fail2ban@kubernetescrd # Example of using a middleware to block certain countries (redumdant for internal apps)
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: dawarich.shiba-toast.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dawarich-app
                port:
                  number: 80
  tls:
    - hosts:
        - dawarich.shiba-toast.com
      secretName: dawarich-tls
