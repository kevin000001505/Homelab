apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich-redis
  namespace: utilities
  labels:
    app: dawarich-redis
    tier: utilities
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 1
  selector:
    matchLabels:
      app: dawarich-redis
      tier: utilities
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: dawarich-redis
        tier: utilities
    spec:
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: dawarich-shared
      containers:
        - name: dawarich-redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: shared
              mountPath: /data
          livenessProbe:
            command: ["redis-cli", "--raw", "incr", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: dawarich-redis
  namespace: utilities
spec:
  selector:
    app: dawarich-redis
  ports:
    - port: 6379
      targetPort: 6379
