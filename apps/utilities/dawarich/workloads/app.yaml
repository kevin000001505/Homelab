apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich-app
  namespace: utilities
  labels:
    app: dawarich-app
    tier: utilities
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 10
  selector:
    matchLabels:
      app: dawarich-app
  template:
    metadata:
      labels:
        app: dawarich-app
        tier: utilities
    spec:
      volumes:
        - name: public
          persistentVolumeClaim:
            claimName: dawarich-public
        - name: watched
          persistentVolumeClaim:
            claimName: dawarich-watched
        - name: storage
          persistentVolumeClaim:
            claimName: dawarich-storage
        - name: db-data
          persistentVolumeClaim:
            claimName: dawarich-db-data

      initContainers:
        - name: wait-for-db
          image: postgis/postgis:17-3.5-alpine
          command:
            [
              "sh",
              "-c",
              "until pg_isready -h dawarich-db -p 5432 -U postgres; do sleep 2; done",
            ]

      containers:
        - name: dawarich-app
          image: freikin/dawarich:latest
          command: ["web-entrypoint.sh"]
          args: ["bin/rails", "server", "-p", "3000", "-b", "::"]
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: public
              mountPath: /var/app/public
            - name: watched
              mountPath: /var/app/tmp/imports/watched
            - name: storage
              mountPath: /var/app/storage
            - name: db-data
              mountPath: /dawarich_db_data

          envFrom:
            - secretRef:
                name: dawarich-secrets
            - configMapRef:
                name: dawarich-config

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "4Gi"

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: dawarich-app
  namespace: utilities
spec:
  selector:
    app: dawarich-app
  ports:
    - port: 80
      targetPort: 3000
