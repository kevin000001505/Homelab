apiVersion: apps/v1
kind: Deployment
metadata:
  name: glance
  namespace: utilities
  labels:
    app: glance
    tier: utilities
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 10
  selector:
    matchLabels:
      app: glance
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: glance
        tier: utilities
    spec:
      volumes:
        - name: config-template # ← ConfigMap goes here
          configMap:
            name: glance-config
        - name: config # ← emptyDir for substituted output
          emptyDir: {}
      initContainers:
        - name: config-init
          image: bhgedigital/envsubst # tiny image with envsubst built in
          command:
            - sh
            - -c
            - envsubst < /template/glance.yml > /config/glance.yml
          env:
            - name: IMMICH_URL
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: immich-url
            - name: IMMICH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: immich-api-key
            - name: JELLYFIN_URL
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: jellyfin-url
            - name: SCRUTINY_URL
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: scrutiny-url
            - name: RADARR_URL
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: radarr-url
            - name: SONARR_URL
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: sonarr-url
            - name: BAZARR_URL
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: bazarr-url
            - name: PROWLARR_URL
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: prowlarr-url
            - name: QBITTORRENT_URL
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: qbittorrent-url
            - name: ADGUARD_HOST
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: adguard-host
            - name: ADGUARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: adguard-username
            - name: ADGUARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: adguard-password
            - name: ARGOCD_URL
              valueFrom:
                secretKeyRef:
                  name: glance-secret
                  key: argocd-url
      containers:
        - name: glance
          image: glanceapp/glance
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
